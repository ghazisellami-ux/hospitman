services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: hospitman
      POSTGRES_PASSWORD: hospitman
      POSTGRES_DB: hospitman
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospitman"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://hospitman:hospitman@db:5432/hospitman
      SECRET_KEY: change-this-in-production-please
      CORS_ORIGINS: '["http://localhost:3003","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
